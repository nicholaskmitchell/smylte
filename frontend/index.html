<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Light by default; the pre-paint script below (and App on toggle) flips
         it to dark so mobile browser chrome matches the theme. -->
    <meta name="theme-color" content="#FBFAF7" />
    <title>Smylte — Tasks &amp; Calendar</title>
    <!-- SVG for modern browsers; PNG fallback for those that won't render an SVG
         tab icon (e.g. older Safari). ?v= busts aggressive favicon caching. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <script>
      // Apply persisted theme before paint (no flash) — Søren's pattern.
      (function () {
        try {
          var t = localStorage.getItem('tasks-theme')
          if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t
          if (t === 'dark') {
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#0C0C10')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
