# Gate for the autopull deploy: main only ever receives commits that passed the
# full backend suite (against a real scratch Radicale) and a frontend
# typecheck + build.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Start scratch Radicale
        # The container runs as uid 1000; the runner user is 1001, so open up the
        # bind mount enough for both (and for the cache-drop test to delete files).
        run: |
          mkdir -p scratch/data/collections
          chmod -R 0777 scratch/data
          docker compose -f scratch/docker-compose.yml up -d --build --wait
      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run tests
        run: python -m pytest
        working-directory: backend
        env:
          SCRATCH_STORAGE: ${{ github.workspace }}/scratch/data/collections

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
